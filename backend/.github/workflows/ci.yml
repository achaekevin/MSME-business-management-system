name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  IMAGE_NAME: msme-bms-backend

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present

  # ── Unit tests (no external services needed) ───────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx jest tests/unit --coverage
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret-min-32-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters

  # ── Integration tests (MySQL + Redis via services) ─────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: msme_bms_test
          MYSQL_USER: msme_user
          MYSQL_PASSWORD: msme_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run migrations on test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://msme_user:msme_pass@localhost:3306/msme_bms_test
      - name: Seed permissions
        run: node -e "require('./prisma/seed.js')" || true
        env:
          DATABASE_URL: mysql://msme_user:msme_pass@localhost:3306/msme_bms_test
          NODE_ENV: test
      - name: Run integration tests
        run: npx jest tests/integration --runInBand --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://msme_user:msme_pass@localhost:3306/msme_bms_test
          TEST_DATABASE_URL: mysql://msme_user:msme_pass@localhost:3306/msme_bms_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-access-secret-min-32-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters
          BCRYPT_SALT_ROUNDS: 4

  # ── Docker build (on main only) ────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (on main, after build) ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/msme-bms
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
            docker-compose down --remove-orphans
            IMAGE_TAG=${{ github.sha }} docker-compose up -d
            docker-compose exec -T api npx prisma migrate deploy
            docker system prune -f
